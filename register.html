<!-- ================= REGISTRATION FORM ================= -->
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h3 class="text-center mb-4">Student Registration</h3>

            <form>

                <!-- PERSONAL INFO -->
                <fieldset class="border p-3 mb-4">
                    <legend class="w-auto px-2">Personal Information</legend>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Upload Resume</label>
                        <input type="file" class="form-control">
                    </div>
                </fieldset>

                <!-- OTHER DETAILS -->
                <fieldset class="border p-3 mb-4">
                    <legend class="w-auto px-2">Other Details</legend>

                    <label class="form-label">Gender</label><br>
                    <div class="form-check form-check-inline">
                        <input type="radio" class="form-check-input" name="gender">
                        <label class="form-check-label">Male</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input type="radio" class="form-check-input" name="gender">
                        <label class="form-check-label">Female</label>
                    </div>

                    <br><br>

                    <label class="form-label">Skills</label>
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input">
                        <label class="form-check-label">HTML</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input">
                        <label class="form-check-label">Java</label>
                    </div>

                    <br>

                    <label class="form-label">Internship Domain</label>
                    <select class="form-select mb-3">
                        <optgroup label="IT">
                            <option>Web Development</option>
                            <option>Java Development</option>
                        </optgroup>
                        <optgroup label="Creative">
                            <option>Graphic Design</option>
                            <option>Content Writing</option>
                        </optgroup>
                    </select>

                    <label class="form-label">Preferred Location</label>
                    <input list="locations" class="form-control">
                    <datalist id="locations">
                        <option>Ahmedabad</option>
                        <option>Mumbai</option>
                        <option>Pune</option>
                    </datalist>
                </fieldset>

                <!-- MORE INFO -->
                <fieldset class="border p-3 mb-4">
                    <legend class="w-auto px-2">More Information</legend>

                    <label class="form-label">Reason for joining</label>
                    <textarea class="form-control mb-3"></textarea>

                    <label>Skill Level</label><br>
                    <meter value="6" min="0" max="10"></meter>

                    <br><br>

                    <label>Profile Completion</label><br>
                    <progress value="50" max="100"></progress>
                </fieldset>

                <div class="text-center">
                    <button class="btn btn-primary">Submit</button>
                    <button class="btn btn-secondary">Reset</button>
                </div>

            </form>

        </div>
    </div>
</div>
